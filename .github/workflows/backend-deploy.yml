name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: quaero-backend-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/quaero-backend
  VM_DEPLOY_SCRIPT_PATH: /opt/quaero/deploy/deploy_backend.sh

jobs:
  enforce-main-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Block deploys from non-main refs
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Deploys are only allowed from main. Current ref: ${GITHUB_REF}"
            exit 1
          fi

  backend-tests:
    needs: enforce-main-branch
    uses: ./.github/workflows/backend-test.yml

  build-and-push:
    runs-on: ubuntu-latest
    needs: backend-tests
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          echo "${{ secrets.GCP_VM_SSH_KEY }}" > vm_key.pem
          chmod 600 vm_key.pem

      - name: Render backend env file from GitHub secret
        run: |
          if [ -z "${{ secrets.BACKEND_ENV_B64 }}" ]; then
            echo "Missing required GitHub secret: BACKEND_ENV_B64"
            exit 1
          fi
          echo "${{ secrets.BACKEND_ENV_B64 }}" | base64 --decode > backend.env
          # Deploy-time source of truth for app version in logs/observability.
          # Overwrite any existing APP_VERSION from secret payload.
          sed -i '/^APP_VERSION=/d' backend.env
          echo "APP_VERSION=sha-${GITHUB_SHA}" >> backend.env
          chmod 600 backend.env

      - name: Ensure deploy/env dirs exist on VM
        run: |
          ssh -i vm_key.pem -o IdentitiesOnly=yes -o StrictHostKeyChecking=no "${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }}" \
            "mkdir -p /opt/quaero/deploy /opt/quaero/env"

      - name: Upload backend env file to VM
        run: |
          scp -i vm_key.pem -o IdentitiesOnly=yes -o StrictHostKeyChecking=no \
            ./backend.env \
            "${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }}:/opt/quaero/env/backend.env"

          ssh -i vm_key.pem -o IdentitiesOnly=yes -o StrictHostKeyChecking=no "${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }}" \
            "chmod 600 /opt/quaero/env/backend.env"

      - name: Upload deploy script to VM
        run: |
          scp -i vm_key.pem -o IdentitiesOnly=yes -o StrictHostKeyChecking=no \
            ./ops/deploy_backend.sh \
            "${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }}:${{ env.VM_DEPLOY_SCRIPT_PATH }}"

      - name: Run deploy script on VM
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          ssh -i vm_key.pem -o IdentitiesOnly=yes -o StrictHostKeyChecking=no "${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }}" \
            "chmod +x '${{ env.VM_DEPLOY_SCRIPT_PATH }}' && \
             GHCR_USERNAME='${{ secrets.GHCR_USERNAME }}' \
             GHCR_TOKEN='${{ secrets.GHCR_TOKEN }}' \
             '${{ env.VM_DEPLOY_SCRIPT_PATH }}' '$IMAGE_TAG'"

      - name: Cleanup local SSH key
        if: always()
        run: rm -f vm_key.pem backend.env
