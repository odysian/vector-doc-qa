name: Backend CI

on:
  workflow_call:
  push:
    branches-ignore:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-test.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-test.yml"

# Deduplicate: push and pull_request:synchronize both fire on a PR commit.
# Using head SHA as the group key means both events land in the same bucket
# and cancel-in-progress drops whichever started first.
concurrency:
  group: backend-ci-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: document_intelligence
        ports:
          - 5434:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d document_intelligence"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5434/document_intelligence?options=-c%20search_path=quaero,public
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key
      OPENAI_API_KEY: test-openai-key
      ANTHROPIC_API_KEY: test-anthropic-key

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy . --ignore-missing-imports --explicit-package-bases

      - name: Pytest
        run: pytest -v

      - name: Bandit
        run: bandit -r app/ -ll
