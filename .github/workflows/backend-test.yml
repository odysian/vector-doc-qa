name: Backend CI

on:
  workflow_call:
  pull_request:

concurrency:
  group: backend-ci-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Always runs. Detects whether backend files changed so the test job
  # can be skipped on frontend-only PRs while still reporting a status.
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect backend changes
        id: detect
        run: |
          # workflow_call = deploy pipeline; always run tests
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "backend=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          BASE="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$BASE" HEAD | grep -qE '^(backend/|\.github/workflows/backend-test\.yml)'; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi

  # Runs only when backend files changed. Spins up postgres + redis.
  backend-tests:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: document_intelligence
        ports:
          - 5434:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d document_intelligence"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5434/document_intelligence?options=-c%20search_path=quaero,public
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key
      OPENAI_API_KEY: test-openai-key
      ANTHROPIC_API_KEY: test-anthropic-key

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy . --ignore-missing-imports --explicit-package-bases

      - name: Pytest
        run: pytest -v

      - name: Bandit
        run: bandit -r app/ -ll

  # Gate job: always runs, always reports the required status check name.
  # Branch protection requires "Backend CI / backend-verify"; this job
  # exits 0 when tests passed or were skipped (no backend changes).
  backend-verify:
    needs: [changes, backend-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report status
        run: |
          result="${{ needs.backend-tests.result }}"
          if [[ "$result" == "success" || "$result" == "skipped" ]]; then
            exit 0
          else
            exit 1
          fi
