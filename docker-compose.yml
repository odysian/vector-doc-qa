services:
  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: document_intelligence
    ports:
      - "5434:5432"
    volumes:
      - doc_intel_postgres_data:/var/lib/postgresql/data
    # Stability: cap parallel workers to prevent index builds from spiking all cores
    command: >
      postgres
      -c max_parallel_maintenance_workers=2
      -c maintenance_work_mem=1GB
      -c max_worker_processes=8
    # Restart on crash but stop after 5 attempts to avoid a crash loop hammering the host
    restart: on-failure:5
    # Compose runtime limits (enforced in regular `docker compose up`).
    cpus: 3.0
    mem_limit: 4g
    mem_reservation: 2g
    pids_limit: 512
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: on-failure:5
    cpus: 0.50
    mem_limit: 512m
    mem_reservation: 256m
    pids_limit: 256

volumes:
  doc_intel_postgres_data:
